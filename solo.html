<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="oklch(0.13 0.02 270)">
<title>Le recrutement de Mehdi · Solo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:           oklch(0.13 0.02 270);
  --bg-elev:      oklch(0.18 0.022 270);
  --bg-elev2:     oklch(0.22 0.024 270);
  --border:       oklch(0.30 0.025 270);
  --border-soft:  oklch(0.25 0.022 270);
  --text:         oklch(0.96 0.008 270);
  --text-soft:    oklch(0.80 0.015 270);
  --dim:          oklch(0.58 0.025 270);

  --c:            oklch(0.72 0.15 245);
  --c-tint:       oklch(0.32 0.08 245);
  --c-glow:       oklch(0.72 0.15 245 / 0.18);

  --r:            oklch(0.78 0.14 70);
  --r-tint:       oklch(0.34 0.08 70);
  --r-glow:       oklch(0.78 0.14 70 / 0.18);

  --ok:           oklch(0.78 0.16 150);
  --ok-glow:      oklch(0.78 0.16 150 / 0.20);
}

html,body{
  height:100%;
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
body{
  display:flex;flex-direction:column;
  min-height:100vh;min-height:100dvh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;-webkit-tap-highlight-color:transparent}

#root{flex:1;display:flex;flex-direction:column;width:100%;max-width:680px;margin:0 auto;padding:18px}

/* ── WELCOME ── */
.w-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}
.w-eyebrow{font-size:.72rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--dim);margin-bottom:22px}
.w-title{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,9vw,3.4rem);font-weight:900;line-height:1.02;margin-bottom:18px;letter-spacing:-0.02em}
.w-sub{color:var(--text-soft);font-size:1.02rem;line-height:1.6;margin-bottom:40px;max-width:42ch;margin-left:auto;margin-right:auto}
.w-cta{
  background:var(--text);color:var(--bg);
  padding:18px 28px;border-radius:14px;
  font-size:1rem;font-weight:700;letter-spacing:-0.01em;
  width:100%;max-width:340px;margin:0 auto;
  transition:transform .18s cubic-bezier(.2,.8,.2,1);
}
.w-cta:active{transform:scale(.97)}
.w-info{margin-top:18px;color:var(--dim);font-size:.82rem}

/* ── RÔLE ── */
.rr-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:24px 0}
.rr-eyebrow{font-size:.7rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--dim);margin-bottom:18px}
.rr-mark{
  width:96px;height:96px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;
  letter-spacing:-0.02em;
}
.rr-mark.is-c{background:var(--c-glow);color:var(--c);box-shadow:0 0 0 1px var(--c-tint)}
.rr-mark.is-r{background:var(--r-glow);color:var(--r);box-shadow:0 0 0 1px var(--r-tint)}
.rr-name{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;letter-spacing:-0.015em;margin-bottom:4px}
.rr-label{color:var(--text-soft);font-size:1rem;margin-bottom:30px}
.rr-bio{
  text-align:left;
  background:var(--bg-elev);
  border:1px solid var(--border-soft);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:28px;
}
.rr-bio p{color:var(--text-soft);font-size:.95rem;line-height:1.65;margin-bottom:10px}
.rr-bio p:last-child{margin-bottom:0}
.rr-bio strong{color:var(--text);font-weight:600}
.rr-cta{
  background:var(--text);color:var(--bg);
  padding:16px 24px;border-radius:14px;
  font-weight:700;font-size:.98rem;
  width:100%;
  transition:transform .18s cubic-bezier(.2,.8,.2,1);
}
.rr-cta:active{transform:scale(.97)}

/* ── STAGE ── */
.stage{flex:1;display:flex;flex-direction:column;padding:6px 0;animation:fadeIn .5s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.s-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.s-pill{
  display:inline-flex;align-items:center;gap:6px;
  height:22px;padding:0 9px;border-radius:11px;
  background:var(--bg-elev);
  border:1px solid var(--border-soft);
  color:var(--text-soft);
  font-weight:500;font-size:.74rem;
}
.s-pill .s-dot{width:6px;height:6px;border-radius:50%}
.s-pill.is-c .s-dot{background:var(--c)}
.s-pill.is-r .s-dot{background:var(--r)}
.s-when{color:var(--dim);font-size:.74rem;font-feature-settings:"tnum";margin-left:auto;white-space:nowrap}

.s-progress{display:flex;gap:5px;margin-bottom:20px}
.s-progress .pd{flex:1;height:3px;border-radius:1.5px;background:var(--border-soft);transition:background .4s}
.s-progress .pd.is-done{background:var(--ok)}
.s-progress .pd.is-cur{background:var(--text)}

.s-act{font-size:.7rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.s-act-num{color:var(--text-soft);font-weight:700}
.s-title{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;line-height:1.15;letter-spacing:-0.015em;margin-bottom:18px}

.s-ctx{
  background:var(--bg-elev);
  border:1px solid var(--border-soft);
  border-radius:14px;
  padding:16px 18px;
  margin-bottom:18px;
}
.s-ctx p{font-size:.95rem;line-height:1.65;color:var(--text)}

.s-doc{margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ══════════════════════════════════════════════════════════
   SLIDER de réponse — design unifié partout
   Slider continu 1.0 → 5.0 par pas de 0.1, valeur affichée,
   bouton "Valider" qui apparait 500ms après le 1er mouvement.
   ══════════════════════════════════════════════════════════ */
.answer-card{
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px 22px 18px;
  margin:0 0 16px;
  box-shadow:0 1px 0 oklch(1 0 0 / 0.02) inset;
}
.answer-value{
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:3.4rem;font-weight:900;
  letter-spacing:-0.03em;line-height:1;
  color:var(--dim);
  font-variant-numeric:tabular-nums;
  margin-bottom:4px;
  transition:color .25s;
}
.answer-value.is-set{color:var(--ok)}
.answer-status{
  text-align:center;
  font-size:.74rem;color:var(--dim);
  letter-spacing:0.22em;text-transform:uppercase;
  font-weight:600;
  margin-bottom:22px;min-height:1em;
}
.slider-bounds{display:flex;justify-content:space-between;gap:14px;padding:0 0 16px}
.slider-bound{font-size:.86rem;font-weight:600;color:var(--text);line-height:1.3;max-width:46%}
.slider-bound.is-min{text-align:left}
.slider-bound.is-max{text-align:right}

.slider-wrap{position:relative;padding:0;margin-bottom:2px}
.slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:36px;background:transparent;outline:none;margin:0;
  cursor:grab;display:block;
}
.slider:active{cursor:grabbing}
.slider::-webkit-slider-runnable-track{
  height:8px;border-radius:4px;
  background:linear-gradient(to right,
    var(--ok) 0%, var(--ok) var(--pct, 0%),
    var(--border) var(--pct, 0%), var(--border) 100%);
}
.slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:28px;height:28px;border-radius:50%;
  background:var(--text);border:3px solid var(--ok);
  margin-top:-10px;
  box-shadow:0 6px 18px oklch(0 0 0 / 0.5);
  transition:transform .15s, box-shadow .25s;
}
.slider:active::-webkit-slider-thumb{
  transform:scale(1.08);
  box-shadow:0 6px 18px oklch(0 0 0 / 0.5), 0 0 0 10px var(--ok-glow);
}
.slider::-moz-range-track{height:8px;border-radius:4px;background:var(--border)}
.slider::-moz-range-progress{height:8px;border-radius:4px;background:var(--ok)}
.slider::-moz-range-thumb{
  width:28px;height:28px;border-radius:50%;
  background:var(--text);border:3px solid var(--ok);
  box-shadow:0 6px 18px oklch(0 0 0 / 0.5);
}

.slider-ticks{position:relative;height:36px;margin:0 14px}
.slider-tick{position:absolute;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px}
.slider-tick-dot{width:5px;height:5px;border-radius:50%;background:var(--border)}
.slider-tick-num{font-family:'Playfair Display',serif;font-size:.94rem;font-weight:700;color:var(--dim);line-height:1}

.validate{
  width:100%;
  background:var(--ok);
  color:oklch(0.13 0.02 270);
  padding:16px 24px;border-radius:14px;
  font-size:1rem;font-weight:700;letter-spacing:-0.01em;
  border:none;cursor:pointer;
  opacity:0;transform:translateY(10px);pointer-events:none;
  transition:opacity .35s cubic-bezier(.2,.8,.2,1), transform .35s cubic-bezier(.2,.8,.2,1);
  display:block;margin-top:auto;
}
.validate.is-visible{opacity:1;transform:none;pointer-events:auto}
.validate:active{transform:scale(.98)}

/* ── ÉCRAN FIN ── */
.e-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:24px 16px;animation:fadeIn .5s ease-out;position:relative;z-index:1}
.e-mark{
  width:96px;height:96px;border-radius:50%;
  background:var(--ok-glow);border:1px solid var(--ok);color:var(--ok);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;font-weight:700;
  margin:0 auto 26px;
  position:relative;
}
.e-mark::before{
  content:"";position:absolute;inset:-10px;border-radius:50%;
  border:1px solid var(--ok);opacity:.3;
  animation:vPulse 2.4s ease-out infinite;
}
@keyframes vPulse{0%{transform:scale(.92);opacity:.6}100%{transform:scale(1.35);opacity:0}}
.e-eyebrow{font-size:.7rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--dim);margin-bottom:18px}
.e-title{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,9vw,3rem);font-weight:900;line-height:1.05;margin-bottom:18px;letter-spacing:-0.02em}
.e-sub{color:var(--text-soft);font-size:1rem;max-width:38ch;margin:0 auto 24px;line-height:1.6}
.e-restart{
  margin-top:6px;
  background:var(--bg-elev);border:1px solid var(--border);color:var(--text);
  padding:13px 22px;border-radius:12px;
  font-size:.9rem;font-weight:600;
}

/* ── CONFETTIS ── */
.confetti-stage{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.confetti-piece{
  position:absolute;top:-24px;
  border-radius:1.5px;opacity:0;
  will-change:transform, opacity;
  animation:confetti-fall linear forwards;
}
@keyframes confetti-fall{
  0%   { transform:translate3d(0, 0, 0) rotateZ(0deg); opacity:0 }
  6%   { opacity:1 }
  88%  { opacity:1 }
  100% { transform:translate3d(var(--dx), 110vh, 0) rotateZ(var(--rz)); opacity:0 }
}

/* ── DOCUMENTS (HTML projeté blanc) ── */
.doc{background:oklch(0.98 0.003 270);color:oklch(0.12 0.012 270);border-radius:12px;box-shadow:0 8px 40px oklch(0 0 0 / 0.4);max-width:600px;width:100%;overflow:hidden;margin:0 auto}
.doc-paper{padding:24px}

.cv-header{border-bottom:2.5px solid oklch(0.18 0.02 270);padding-bottom:14px;margin-bottom:18px}
.cv-name{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;letter-spacing:0.5px;color:oklch(0.10 0.015 270)}
.cv-title{font-size:.9rem;color:oklch(0.42 0.015 270);margin:2px 0}
.cv-contact{font-family:monospace;font-size:.72rem;color:oklch(0.58 0.01 270);margin-top:4px}
.cv-section{margin-bottom:16px}
.cv-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:oklch(0.68 0.01 270);border-bottom:1px solid oklch(0.92 0.005 270);padding-bottom:4px;margin-bottom:10px;font-weight:700}
.cv-job{margin-bottom:12px}
.cv-job-top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.cv-job-top strong{font-size:.85rem;color:oklch(0.14 0.015 270)}
.cv-date{font-size:.72rem;color:oklch(0.62 0.01 270);font-family:monospace;white-space:nowrap}
.cv-job ul{padding-left:18px}
.cv-job li{font-size:.84rem;color:oklch(0.30 0.012 270);margin-bottom:2px;line-height:1.5}
.cv-gap{background:oklch(0.96 0.06 90);border-left:3px solid oklch(0.72 0.16 70);padding:7px 12px;font-size:.8rem;color:oklch(0.40 0.10 70);margin:6px 0;border-radius:0 4px 4px 0;font-weight:600}
.cv-section p{font-size:.84rem;color:oklch(0.30 0.012 270);margin-bottom:3px}

.transcript-header{background:oklch(0.18 0.02 270);color:oklch(0.72 0.01 270);padding:10px 16px;margin:-24px -24px 20px;font-size:.8rem;font-family:monospace;display:flex;justify-content:space-between}
.transcript-body{display:flex;flex-direction:column;gap:12px}
.tline{display:flex;gap:10px}
.tspk{font-weight:700;font-size:.66rem;text-transform:uppercase;letter-spacing:1px;width:54px;flex-shrink:0;padding-top:2px}
.tline-rh .tspk{color:oklch(0.55 0.14 35)}
.tline-c .tspk{color:oklch(0.42 0.14 250)}
.ttxt{font-size:.88rem;color:oklch(0.18 0.015 270);line-height:1.55}
.ttxt em{color:oklch(0.62 0.01 270);font-size:.84rem}

.email-meta{background:oklch(0.95 0.005 270);margin:-24px -24px 20px;padding:16px 24px;border-bottom:1px solid oklch(0.88 0.005 270)}
.email-alert{background:oklch(0.97 0.04 70);border-bottom-color:oklch(0.85 0.08 70)}
.email-row{display:flex;gap:10px;margin-bottom:3px;font-size:.82rem}
.email-lbl{color:oklch(0.62 0.01 270);width:48px;flex-shrink:0}
.email-body p{font-size:.88rem;color:oklch(0.14 0.015 270);margin-bottom:13px;line-height:1.65}
.email-table{background:oklch(0.95 0.005 270);border-radius:6px;padding:10px 14px;margin:10px 0}
.email-tr{display:flex;gap:12px;padding:4px 0;border-bottom:1px solid oklch(0.90 0.005 270);font-size:.82rem}
.email-tr:last-child{border-bottom:none}
.email-tr span:first-child{color:oklch(0.62 0.01 270);width:110px;flex-shrink:0}
.email-attach{background:oklch(0.95 0.04 245);border-radius:6px;padding:9px 12px;font-size:.78rem;color:oklch(0.42 0.14 250);margin-top:14px;border:1px solid oklch(0.84 0.08 245)}

.slack-topbar{background:oklch(0.30 0.20 320);color:oklch(0.92 0.06 320);padding:11px 18px;font-size:.85rem;font-weight:600}
.slack-body{padding:18px}
.slack-msg{display:flex;gap:10px;margin-bottom:14px}
.slack-reply{padding-left:28px}
.slack-time{font-size:.68rem;color:oklch(0.62 0.01 270);width:38px;flex-shrink:0;padding-top:2px}
.slack-content{flex:1}
.slack-user{font-weight:700;font-size:.82rem;color:oklch(0.14 0.015 270);display:block;margin-bottom:2px}
.slack-badge{background:oklch(0.92 0.005 270);font-weight:400;font-size:.68rem;padding:1px 6px;border-radius:3px;margin-left:4px;font-style:normal;color:oklch(0.48 0.01 270)}
.slack-text{font-size:.84rem;color:oklch(0.18 0.012 270);display:block;margin-bottom:3px;line-height:1.5}
.slack-react{font-size:.78rem;color:oklch(0.58 0.01 270);display:block}
.slack-note{background:oklch(0.95 0.005 270);border-radius:6px;padding:9px 12px;font-size:.74rem;color:oklch(0.58 0.01 270);font-style:italic;margin-top:6px}

.eval-top{text-align:center;border-bottom:2.5px solid oklch(0.18 0.02 270);padding-bottom:12px;margin-bottom:14px}
.eval-confid{display:inline-block;background:oklch(0.96 0.04 25);color:oklch(0.45 0.18 25);font-size:.65rem;font-weight:700;letter-spacing:2px;padding:3px 12px;border-radius:100px;margin-bottom:7px;border:1px solid oklch(0.88 0.08 25)}
.eval-title{font-size:.9rem;font-weight:700;letter-spacing:.5px;margin-bottom:7px;font-family:'Playfair Display',serif}
.eval-meta{font-size:.74rem;color:oklch(0.48 0.01 270);line-height:1.8}
.eval-grid{margin-bottom:14px}
.eval-row{display:grid;grid-template-columns:2fr 80px 2fr;gap:10px;padding:7px 0;border-bottom:1px solid oklch(0.94 0.005 270);font-size:.8rem;align-items:center}
.eval-head{font-weight:700;font-size:.66rem;text-transform:uppercase;letter-spacing:1px;color:oklch(0.72 0.01 270)}
.eval-row span:last-child{color:oklch(0.42 0.01 270);font-style:italic}
.estars{letter-spacing:2px;color:oklch(0.72 0.16 70);font-size:.92rem}
.elow{color:oklch(0.62 0.18 25)}
.eval-comment{background:oklch(0.96 0.005 270);border-radius:6px;padding:13px;margin-bottom:14px}
.eval-comment-lbl{font-size:.66rem;text-transform:uppercase;letter-spacing:1px;color:oklch(0.68 0.01 270);margin-bottom:7px;font-weight:700}
.eval-comment p{font-size:.84rem;color:oklch(0.20 0.012 270);line-height:1.6;font-style:italic}
.eval-decision{display:flex;flex-wrap:wrap;gap:14px;font-size:.8rem;color:oklch(0.36 0.01 270);padding-top:10px;border-top:2.5px solid oklch(0.18 0.02 270)}
.eval-pending{color:oklch(0.55 0.14 35);font-weight:700}

@media (max-height: 700px){
  .s-title{font-size:1.45rem}
  .lk{height:54px;font-size:1.15rem}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>

<body>
<div id="root"></div>

<script src="data.js"></script>
<script>
(function(){
  'use strict';

  const S = {
    view: 'welcome',
    role: null,
    step: 0,
    selected: null,
    validateTimer: null,
    confettiSpawned: false,
  };

  function render(){
    const r = document.getElementById('root');
    let html = '';
    switch(S.view){
      case 'welcome': html = vWelcome(); break;
      case 'reveal':  html = vReveal();  break;
      case 'stage':   html = vStage();   break;
      case 'end':     html = vEnd();     break;
      default:        html = vWelcome();
    }
    r.innerHTML = html;
    window.scrollTo(0, 0);
    if(S.view === 'stage'){ initSliderPct(); }
    if(S.view === 'end' && !S.confettiSpawned){
      spawnConfetti();
      S.confettiSpawned = true;
    }
  }

  function initSliderPct(){
    const slider = document.querySelector('[data-slider]');
    if(!slider) return;
    const v = parseFloat(slider.value);
    const pct = ((v - 1) / 4) * 100;
    slider.style.setProperty('--pct', pct + '%');
  }

  function onSliderInput(input){
    const v = Math.round(parseFloat(input.value) * 10) / 10;
    const pct = ((v - 1) / 4) * 100;
    input.style.setProperty('--pct', pct + '%');

    S.selected = v;

    const display = document.getElementById('val-display');
    const status = document.getElementById('val-status');
    if(display){
      display.textContent = v.toFixed(1);
      display.classList.add('is-set');
    }
    if(status){ status.textContent = 'Réponse sélectionnée'; }

    const btn = document.getElementById('validate-btn');
    if(btn) btn.classList.remove('is-visible');
    if(S.validateTimer) clearTimeout(S.validateTimer);
    S.validateTimer = setTimeout(() => {
      const b = document.getElementById('validate-btn');
      if(b) b.classList.add('is-visible');
    }, 500);
  }

  function spawnConfetti(){
    const stage = document.getElementById('confetti-stage');
    if(!stage) return;
    const colors = [
      'oklch(0.78 0.16 150)',
      'oklch(0.72 0.15 245)',
      'oklch(0.78 0.14 70)',
      'oklch(0.78 0.18 320)',
      'oklch(0.86 0.16 95)',
      'oklch(0.96 0.008 270)',
    ];
    const N = 90;
    const frag = document.createDocumentFragment();
    for(let i = 0; i < N; i++){
      const c = document.createElement('span');
      c.className = 'confetti-piece';
      const w = 5 + Math.random() * 6;
      const h = 8 + Math.random() * 12;
      const dx = (Math.random() - 0.5) * 360;
      const rz = (Math.random() < 0.5 ? -1 : 1) * (360 + Math.random() * 720);
      const dur = 3.4 + Math.random() * 2.2;
      const delay = Math.random() * 0.6;
      c.style.cssText =
        `left:${Math.random()*100}%;` +
        `width:${w}px;height:${h}px;` +
        `background:${colors[Math.floor(Math.random()*colors.length)]};` +
        `--dx:${dx}px;--rz:${rz}deg;` +
        `animation-duration:${dur}s;animation-delay:${delay}s;`;
      frag.appendChild(c);
    }
    stage.appendChild(frag);
    setTimeout(() => { if(stage) stage.innerHTML = ''; }, 7000);
  }

  function vWelcome(){
    return `
<div class="w-wrap">
  <div class="w-eyebrow">Mode démo · test individuel</div>
  <h1 class="w-title">Le recrutement<br>de Mehdi</h1>
  <p class="w-sub">Vous allez vivre six actes du recrutement de Mehdi, depuis l'un des deux points de vue. Aucune préparation requise.</p>
  <button class="w-cta" data-action="start">Commencer</button>
  <div class="w-info">Votre rôle sera attribué au hasard.</div>
</div>`;
  }

  function vReveal(){
    const role = ROLES[S.role];
    const isC = S.role === 'c';
    return `
<div class="rr-wrap">
  <div class="rr-eyebrow">Vous incarnez</div>
  <div class="rr-mark ${isC?'is-c':'is-r'}">${role.initial}</div>
  <div class="rr-name">${role.name}</div>
  <div class="rr-label">${role.label}</div>
  <div class="rr-bio">${INTRO[S.role]}</div>
  <button class="rr-cta" data-action="begin">Démarrer l'acte 1</button>
</div>`;
  }

  function vStage(){
    const step = STEPS[S.step];
    const ctx = CTX[S.role][S.step];
    const q = pickQuestion(step, S.role);
    const role = ROLES[S.role];
    const isC = S.role === 'c';

    const dots = STEPS.map((_, i) => {
      const cls = i < S.step ? 'is-done' : i === S.step ? 'is-cur' : '';
      return `<div class="pd ${cls}"></div>`;
    }).join('');

    const isLast = S.step === STEPS.length - 1;
    const hasVal = S.selected !== null && S.selected !== undefined;
    const initial = hasVal ? S.selected : 3;
    const display = hasVal ? S.selected.toFixed(1) : '—';
    const status = hasVal ? 'Réponse sélectionnée' : 'Faites glisser pour répondre';

    return `
<div class="stage">
  <div class="s-top">
    <span class="s-pill ${isC?'is-c':'is-r'}">
      <span class="s-dot"></span><span>${role.short} · ${role.label}</span>
    </span>
    <span class="s-when">${step.when}</span>
  </div>

  <div class="s-progress">${dots}</div>

  <div class="s-act"><span class="s-act-num">${step.title}</span> · ${step.sub}</div>
  <div class="s-title">${q}</div>

  <div class="s-ctx"><p>${ctx}</p></div>

  <div class="s-doc">${DOCS[S.step]}</div>

  <div class="answer-card">
    <div class="answer-value ${hasVal?'is-set':''}" id="val-display">${display}</div>
    <div class="answer-status" id="val-status">${status}</div>

    <div class="slider-bounds">
      <div class="slider-bound is-min">${step.min}</div>
      <div class="slider-bound is-max">${step.max}</div>
    </div>

    <div class="slider-wrap">
      <input class="slider" type="range" min="1" max="5" step="0.1" value="${initial}" data-slider aria-label="Choisissez une valeur entre 1 et 5">
    </div>

    <div class="slider-ticks">
      <div class="slider-tick" style="left:0%"><div class="slider-tick-dot"></div><span class="slider-tick-num">1</span></div>
      <div class="slider-tick" style="left:25%"><div class="slider-tick-dot"></div><span class="slider-tick-num">2</span></div>
      <div class="slider-tick" style="left:50%"><div class="slider-tick-dot"></div><span class="slider-tick-num">3</span></div>
      <div class="slider-tick" style="left:75%"><div class="slider-tick-dot"></div><span class="slider-tick-num">4</span></div>
      <div class="slider-tick" style="left:100%"><div class="slider-tick-dot"></div><span class="slider-tick-num">5</span></div>
    </div>
  </div>

  <button class="validate${hasVal?' is-visible':''}" id="validate-btn" data-action="validate">${isLast ? 'Valider et terminer' : 'Valider la réponse'}</button>
</div>`;
  }

  function vEnd(){
    return `
<div class="confetti-stage" id="confetti-stage"></div>
<div class="e-wrap">
  <div class="e-mark">✓</div>
  <div class="e-eyebrow">Vous avez vécu les six actes</div>
  <h1 class="e-title">Merci d'avoir<br>participé à l'expérience.</h1>
  <p class="e-sub">Lors d'une session live, l'animateur reviendrait maintenant sur chaque acte pour révéler le biais en jeu.</p>
  <button class="e-restart" data-action="restart">Recommencer</button>
</div>`;
  }

  function pickQuestion(step, role){
    if(role === 'c' && step.qC) return step.qC;
    if(role === 'r' && step.qR) return step.qR;
    return step.q;
  }

  function start(){
    S.role = Math.random() < 0.5 ? 'c' : 'r';
    S.view = 'reveal';
    render();
  }

  function begin(){
    S.step = 0;
    resetSelection();
    S.view = 'stage';
    render();
  }

  function restart(){
    S.role = null;
    S.step = 0;
    resetSelection();
    S.view = 'welcome';
    S.confettiSpawned = false;
    render();
  }

  function resetSelection(){
    S.selected = null;
    if(S.validateTimer){ clearTimeout(S.validateTimer); S.validateTimer = null; }
  }

  function confirmVote(){
    if(S.selected === null || S.selected === undefined) return;
    if(S.validateTimer){ clearTimeout(S.validateTimer); S.validateTimer = null; }
    resetSelection();
    if(S.step >= STEPS.length - 1){
      S.view = 'end';
    } else {
      S.step++;
    }
    render();
  }

  document.addEventListener('click', function(e){
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    if(action === 'start') start();
    else if(action === 'begin') begin();
    else if(action === 'restart') restart();
    else if(action === 'validate') confirmVote();
  });
  document.addEventListener('input', function(e){
    if(e.target.matches('[data-slider]')) onSliderInput(e.target);
  });

  render();
})();
</script>
</body>
</html>
