<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Le Recrutement de Mehdi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--bg2:#0f0f1e;--bg3:#16162a;--border:#22223a;
  --text:#e4e4f4;--dim:#6060a0;
  --c:#4f8fff;--c2:rgba(79,143,255,.12);
  --r:#f59e0b;--r2:rgba(245,158,11,.12);
  --g:#22c55e;--red:#ef4444;--yel:#f5c842;
  --rad:12px;--rad-sm:8px;
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:16px}
button{font-family:inherit;cursor:pointer}

/* ── SCREENS ── */
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

/* ── WELCOME ── */
.welcome-box{text-align:center;max-width:480px;width:100%}
.game-eyebrow{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.game-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.4rem);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 40%,var(--dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.game-desc{color:var(--dim);margin-bottom:40px;font-size:.95rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:420px){.role-grid{grid-template-columns:1fr}}
.role-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--rad);padding:22px 16px;text-align:center;transition:all .2s;color:var(--text)}
.role-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.role-c{border-color:color-mix(in srgb,var(--c) 40%,transparent)}
.role-c:hover{background:var(--c2);border-color:var(--c)}
.role-r{border-color:color-mix(in srgb,var(--r) 40%,transparent)}
.role-r:hover{background:var(--r2);border-color:var(--r)}
.role-icon{font-size:2rem;margin-bottom:8px}
.role-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.role-hint{font-size:.75rem;color:var(--dim)}
.admin-link{background:none;border:none;color:var(--dim);font-size:.8rem;padding:6px 12px;border-radius:var(--rad-sm);transition:color .2s}
.admin-link:hover{color:var(--text)}
.preview-link{background:var(--bg2);border:1px solid var(--border);color:var(--dim);font-size:.8rem;padding:8px 16px;border-radius:var(--rad-sm);transition:all .2s;display:inline-block;margin-bottom:8px}
.preview-link:hover{color:var(--text);border-color:#444}

/* ── PREVIEW ── */
.preview-wrap{max-width:1100px;width:100%;margin:0 auto;padding:28px 20px}
.preview-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.preview-header h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;flex:1}
.preview-step-nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pnav-btn{padding:6px 12px;border-radius:var(--rad-sm);border:1px solid var(--border);background:var(--bg2);color:var(--dim);font-size:.78rem;transition:all .15s}
.pnav-btn:hover{border-color:#555;color:var(--text)}
.pnav-btn-cur{background:var(--bg3);border-color:#555;color:var(--text);font-weight:600}
.preview-body{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:0}
@media(max-width:720px){.preview-body{grid-template-columns:1fr}}
.preview-col{display:flex;flex-direction:column;gap:14px}
.preview-col-hdr{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.preview-doc-wrap{overflow-x:auto}
.preview-doc-wrap .doc{max-width:100%}
.preview-ctx{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:14px 16px}
.preview-ctx-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px}
.preview-ctx p{font-size:.84rem;color:var(--text);line-height:1.65}
.preview-vote-q{background:var(--bg3);border-radius:var(--rad-sm);padding:12px 14px;font-size:.84rem;color:var(--dim);font-style:italic;border-left:3px solid var(--border)}
.preview-divider{width:1px;background:var(--border);display:none}
.preview-step-title{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);text-align:center;margin-bottom:16px}

/* ── AUTH ── */
.auth-box{max-width:380px;width:100%}
.auth-box h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin-bottom:6px}
.auth-sub{color:var(--dim);font-size:.9rem;margin-bottom:24px}
.code-input{width:100%;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad-sm);color:var(--text);font-size:1rem;margin-bottom:10px;outline:none;transition:border-color .2s}
.code-input:focus{border-color:var(--c)}
.err{color:var(--red);font-size:.82rem;margin-bottom:10px}

/* ── PARTICIPANT SCREENS ── */
.part-screen{align-items:flex-start;padding:0}
.part-inner{width:100%;max-width:520px;margin:0 auto;padding:20px}
.role-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.badge-c{background:var(--c2);color:var(--c);border:1px solid color-mix(in srgb,var(--c) 30%,transparent)}
.badge-r{background:var(--r2);color:var(--r);border:1px solid color-mix(in srgb,var(--r) 30%,transparent)}
.step-chip{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:3px 12px;font-size:.72rem;color:var(--dim);margin-bottom:16px}
.ctx-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:16px 18px;margin-bottom:16px}
.ctx-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px}
.ctx-card p{font-size:.88rem;color:var(--text);line-height:1.65}
.ctx-small p{font-size:.82rem}

.waiting-row{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:.85rem;padding:8px 0}
.dot-pulse{width:8px;height:8px;border-radius:50%;background:var(--g);animation:dpulse 1.6s ease-in-out infinite}
@keyframes dpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

.vote-area{padding-top:4px}
.vote-q{font-size:1.1rem;font-weight:600;margin-bottom:24px;line-height:1.5}
.likert-wrap{margin-bottom:28px}
.likert-ends{display:flex;justify-content:space-between;margin-bottom:8px}
.likert-ends span{font-size:.7rem;color:var(--dim);max-width:38%}
.likert-ends span:last-child{text-align:right}
.likert-row{display:flex;gap:8px;justify-content:center}
.lbtn{width:54px;height:54px;border-radius:50%;border:2px solid var(--border);background:var(--bg2);color:var(--text);font-size:1.1rem;font-weight:700;transition:all .15s}
.lbtn:hover{border-color:var(--c);background:var(--c2);transform:scale(1.08)}
.lbtn-sel{border-color:var(--g)!important;background:rgba(34,197,94,.15)!important;color:var(--g)}

/* ── VOTED ── */
.voted-box{text-align:center}
.voted-icon{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.15);border:2px solid var(--g);color:var(--g);font-size:1.8rem;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.voted-box h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px}
.voted-box p{color:var(--dim);font-size:.9rem}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:15px;border-radius:var(--rad-sm);border:none;background:var(--g);color:#000;font-size:.95rem;font-weight:700;transition:opacity .2s}
.btn-primary:hover:not(:disabled){opacity:.85}
.btn-disabled{opacity:.3;cursor:not-allowed!important}
.back{background:none;border:none;color:var(--dim);font-size:.85rem;display:flex;align-items:center;gap:6px;margin-bottom:20px;padding:0;transition:color .2s}
.back:hover{color:var(--text)}

/* ── ADMIN LAYOUT ── */
.admin-layout{display:grid;grid-template-columns:1fr 300px;min-height:100vh}
.admin-layout.proj-mode{grid-template-columns:1fr}
.admin-layout.proj-mode .admin-sidebar{display:none}

.doc-panel{background:var(--bg);padding:40px 32px;overflow-y:auto;display:flex;flex-direction:column;align-items:center}
.doc-step-label{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:20px;text-align:center}

.admin-sidebar{background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto}
.sidebar-inner{padding:20px;display:flex;flex-direction:column;gap:0}
.sb-section{padding:14px 0}
.sb-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:10px}
.sb-divider{height:1px;background:var(--border);margin:0 0}

.progress-row{display:flex;gap:5px;margin-bottom:10px}
.pdot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.pdot-done{background:var(--g)}
.pdot-cur{background:var(--yel)}
.step-display{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;line-height:1;color:var(--text)}
.step-display span{font-size:1rem;color:var(--dim);font-family:'DM Sans',sans-serif;font-weight:400}
.step-name{font-size:.78rem;color:var(--dim);margin-bottom:10px;margin-top:2px}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nav-btn{padding:9px;border-radius:var(--rad-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:.8rem;font-weight:600;transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:#555}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-next{background:rgba(79,143,255,.1);border-color:color-mix(in srgb,var(--c) 40%,transparent);color:var(--c)}
.nav-next:hover:not(:disabled){background:rgba(79,143,255,.2)!important}

.action-btn{width:100%;padding:10px 14px;border-radius:var(--rad-sm);font-size:.82rem;font-weight:600;margin-bottom:6px;transition:all .15s}
.action-btn:last-child{margin-bottom:0}
.btn-start{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);color:var(--g)}
.btn-start:hover{background:rgba(34,197,94,.2)}
.btn-stop{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:var(--red)}
.btn-stop:hover{background:rgba(239,68,68,.2)}
.btn-results{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.3);color:var(--yel)}
.btn-results:hover{background:rgba(245,200,66,.15)}
.btn-results-active{background:rgba(245,200,66,.2);border:1px solid var(--yel);color:var(--yel)}
.btn-proj{background:var(--bg3);border:1px solid var(--border);color:var(--dim)}
.btn-proj:hover{color:var(--text);border-color:#555}
.btn-reset{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.btn-reset:hover{background:rgba(239,68,68,.15)}

.vote-mini-counts{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.vmc-row{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--dim)}
.vmc-row strong{margin-left:auto;color:var(--text);font-size:.9rem}
.vmc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-c{background:var(--c)}
.dot-r{background:var(--r)}

/* ── RESULTS ── */
.results-panel{margin-top:12px;display:flex;flex-direction:column;gap:12px}
.res-team{background:var(--bg3);border-radius:var(--rad-sm);padding:12px}
.res-team-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.res-team-name{font-size:.75rem;font-weight:600;color:var(--dim)}
.res-avg{font-size:1.3rem;font-weight:800;font-family:'Playfair Display',serif}
.res-avg small{font-size:.6rem;font-weight:400;color:var(--dim);font-family:'DM Sans',sans-serif}
.avg-c{color:var(--c)}
.avg-r{color:var(--r)}
.res-bars{display:flex;gap:4px;align-items:flex-end;height:72px}
.res-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.res-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height .4s}
.bar-c{background:var(--c)}
.bar-r{background:var(--r)}
.res-bar-lbl{font-size:.6rem;color:var(--dim)}
.res-bar-n{font-size:.6rem;color:var(--text);font-weight:600}

/* ── DOCUMENTS (white paper on dark) ── */
.doc{background:#fff;color:#1a1a2e;border-radius:var(--rad);box-shadow:0 8px 60px rgba(0,0,0,.6);max-width:660px;width:100%;overflow:hidden}
.doc-paper{padding:32px}

/* CV */
.cv-header{border-bottom:2.5px solid #1a1a2e;padding-bottom:16px;margin-bottom:20px}
.cv-name{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;letter-spacing:1px;color:#0a0a1a}
.cv-title{font-size:.95rem;color:#555;margin:2px 0}
.cv-contact{font-family:monospace;font-size:.75rem;color:#888;margin-top:4px}
.cv-section{margin-bottom:18px}
.cv-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:#aaa;border-bottom:1px solid #eee;padding-bottom:5px;margin-bottom:12px;font-weight:600}
.cv-job{margin-bottom:14px}
.cv-job-top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.cv-job-top strong{font-size:.85rem;color:#111}
.cv-date{font-size:.72rem;color:#999;font-family:monospace;white-space:nowrap}
.cv-job ul{padding-left:18px}
.cv-job li{font-size:.83rem;color:#444;margin-bottom:2px;line-height:1.5}
.cv-gap{background:#fffbeb;border-left:3px solid #f59e0b;padding:7px 12px;font-size:.78rem;color:#92400e;margin:6px 0;border-radius:0 4px 4px 0}
.cv-section p{font-size:.83rem;color:#444;margin-bottom:3px}

/* Transcript */
.transcript-header{background:#1e1e2e;color:#aaa;padding:10px 16px;margin:-32px -32px 24px;font-size:.8rem;font-family:monospace;display:flex;justify-content:space-between}
.transcript-body{display:flex;flex-direction:column;gap:13px}
.tline{display:flex;gap:12px}
.tspk{font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;width:56px;flex-shrink:0;padding-top:3px}
.tline-rh .tspk{color:#c2410c}
.tline-c .tspk{color:#1d4ed8}
.ttxt{font-size:.87rem;color:#222;line-height:1.65}
.ttxt em{color:#999;font-size:.82rem}

/* Email */
.email-meta{background:#f4f4f6;margin:-32px -32px 22px;padding:18px 32px;border-bottom:1px solid #e0e0e8}
.email-alert{background:#fff7ed;border-bottom-color:#fed7aa}
.email-row{display:flex;gap:10px;margin-bottom:3px;font-size:.83rem}
.email-lbl{color:#aaa;width:48px;flex-shrink:0}
.email-body p{font-size:.87rem;color:#1a1a2e;margin-bottom:13px;line-height:1.7}
.email-table{background:#f4f4f6;border-radius:6px;padding:10px 14px;margin:10px 0}
.email-tr{display:flex;gap:12px;padding:4px 0;border-bottom:1px solid #e8e8f0;font-size:.82rem}
.email-tr:last-child{border-bottom:none}
.email-tr span:first-child{color:#999;width:110px;flex-shrink:0}
.email-attach{background:#eff6ff;border-radius:6px;padding:9px 12px;font-size:.78rem;color:#1d4ed8;margin-top:14px;border:1px solid #bfdbfe}

/* Slack */
.slack-topbar{background:#3c0063;color:#e0c8ff;padding:11px 20px;font-size:.85rem;font-weight:600}
.slack-body{padding:20px}
.slack-msg{display:flex;gap:10px;margin-bottom:14px}
.slack-reply{padding-left:30px}
.slack-time{font-size:.68rem;color:#aaa;width:36px;flex-shrink:0;padding-top:2px}
.slack-content{flex:1}
.slack-user{font-weight:700;font-size:.82rem;color:#1a1a2e;display:block;margin-bottom:2px}
.slack-badge{background:#eee;font-weight:400;font-size:.68rem;padding:1px 6px;border-radius:3px;margin-left:4px;font-style:normal;color:#666}
.slack-text{font-size:.85rem;color:#222;display:block;margin-bottom:3px;line-height:1.5}
.slack-react{font-size:.78rem;color:#888;display:block}
.slack-note{background:#f5f5f5;border-radius:6px;padding:9px 12px;font-size:.75rem;color:#999;font-style:italic;margin-top:6px}

/* Eval */
.eval-top{text-align:center;border-bottom:2.5px solid #1a1a2e;padding-bottom:14px;margin-bottom:16px}
.eval-confid{display:inline-block;background:#fef2f2;color:#b91c1c;font-size:.65rem;font-weight:700;letter-spacing:2px;padding:3px 12px;border-radius:100px;margin-bottom:7px;border:1px solid #fecaca}
.eval-title{font-size:.9rem;font-weight:700;letter-spacing:.5px;margin-bottom:7px;font-family:'Playfair Display',serif}
.eval-meta{font-size:.75rem;color:#777;line-height:1.8}
.eval-grid{margin-bottom:16px}
.eval-row{display:grid;grid-template-columns:2fr 80px 2fr;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:.8rem;align-items:center}
.eval-head{font-weight:700;font-size:.67rem;text-transform:uppercase;letter-spacing:1px;color:#bbb}
.eval-row span:last-child{color:#666;font-style:italic}
.estars{letter-spacing:2px;color:#f59e0b;font-size:.9rem}
.elow{color:#ef4444}
.eval-comment{background:#f8f8fb;border-radius:6px;padding:13px;margin-bottom:14px}
.eval-comment-lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:7px;font-weight:600}
.eval-comment p{font-size:.85rem;color:#333;line-height:1.65;font-style:italic}
.eval-decision{display:flex;flex-wrap:wrap;gap:14px;font-size:.8rem;color:#555;padding-top:10px;border-top:2px solid #1a1a2e}
.eval-pending{color:#c2410c;font-weight:600}


/* ── BIAIS PANEL ── */
.biais-panel{background:linear-gradient(135deg,rgba(245,200,66,.06),rgba(79,143,255,.06));border:1px solid rgba(245,200,66,.25);border-radius:var(--rad);padding:14px 16px;margin-top:10px}
.biais-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.biais-icon{font-size:1.1rem}
.biais-name{font-weight:800;font-size:.85rem;color:var(--yel)}
.biais-def{font-size:.78rem;color:var(--dim);line-height:1.55;margin-bottom:10px;font-style:italic}
.biais-split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.biais-split{grid-template-columns:1fr}}
.biais-side{border-radius:var(--rad-sm);padding:9px 11px;font-size:.78rem;line-height:1.55}
.biais-side-c{background:var(--c2);border:1px solid rgba(79,143,255,.2)}
.biais-side-r{background:var(--r2);border:1px solid rgba(245,158,11,.2)}
.biais-side-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px;display:block}
.biais-side-c .biais-side-lbl{color:var(--c)}
.biais-side-r .biais-side-lbl{color:var(--r)}
.biais-side p{color:var(--text)}

/* preview biais */
.preview-biais{margin-top:14px}
/* ── PROJ TOGGLE ── */
.proj-toggle-btn{position:fixed;top:12px;right:12px;background:rgba(15,15,30,.8);border:1px solid var(--border);color:var(--dim);padding:5px 13px;border-radius:100px;font-size:.72rem;cursor:pointer;backdrop-filter:blur(8px);z-index:100;transition:all .2s}
.proj-toggle-btn:hover{color:var(--text);border-color:#555}

@media(max-width:640px){
  .admin-layout{grid-template-columns:1fr}
  .admin-sidebar{border-left:none;border-top:1px solid var(--border)}
  .doc-paper{padding:20px}
  .transcript-header{margin:-20px -20px 18px}
  .email-meta{margin:-20px -20px 18px;padding:14px 20px}
  .lbtn{width:48px;height:48px;font-size:1rem}
}

/* ── INTRO PORTRAIT ── */
.intro-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:20px 22px;margin-bottom:24px}
.intro-card p{font-size:.9rem;color:var(--text);line-height:1.75;margin-bottom:14px}
.intro-card p:last-child{margin-bottom:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script>
'use strict';

// ══ SUPABASE ══

const KGS = 'game_state';

async function getGS(){
  const {data}=await sb.from('game_kv').select('value').eq('key',KGS).maybeSingle();
  return data?data.value:{step:0,voting:false,results:false,biais:false};
}
async function setGS(gs){await sb.from('game_kv').upsert({key:KGS,value:gs})}
async function getVotes(n){
  const {data}=await sb.from('votes').select('team,value').eq('step',n);
  return data?data.map(r=>({t:r.team,v:r.value})):[];
}
async function addVote(n,team,val){await sb.from('votes').insert({step:n,team,value:val})}
async function resetAll(){
  await sb.from('game_kv').upsert({key:KGS,value:{step:0,voting:false,results:false,biais:false}});
  await sb.from('votes').delete().gte('step',0);
}

// ══ APP STATE ══
let S={view:'welcome',role:null,voted:{},gs:null,votes:[],proj:false,sel:null,authErr:false};
let pollTmr=null;

function startPoll(){if(pollTmr)clearInterval(pollTmr);pollTmr=setInterval(tick,2600)}
function stopPoll(){if(pollTmr){clearInterval(pollTmr);pollTmr=null}}

async function tick(){
  const gs=await getGS();
  if(S.view==='admin'){
    const votes=(gs.voting||gs.results)?await getVotes(gs.step):S.votes;
    const gsChanged=JSON.stringify(gs)!==JSON.stringify(S.gs);
    const vChanged=JSON.stringify(votes)!==JSON.stringify(S.votes);
    if(gsChanged||vChanged){S.gs=gs;S.votes=votes;render()}
    return;
  }
  const prevStep=S.gs?S.gs.step:-1;
  S.gs=gs;
  if(gs.voting&&!S.voted[gs.step]){
    if(S.view!=='vote'||prevStep!==gs.step){S.sel=null;S.view='vote';render()}
  } else if(!gs.voting&&S.view==='vote'){
    S.view='wait';render();
  } else if(S.view==='wait'&&gs.voting&&!S.voted[gs.step]){
    S.sel=null;S.view='vote';render();
  }
}

// ══ RENDER ══
function render(){
  const r=document.getElementById('root');
  if(S.view==='welcome') r.innerHTML=vWelcome();
  else if(S.view==='auth') r.innerHTML=vAuth();
  else if(S.view==='wait') r.innerHTML=vWait();
  else if(S.view==='vote') r.innerHTML=vVote();
  else if(S.view==='voted') r.innerHTML=vVoted();
  else if(S.view==='admin') r.innerHTML=vAdmin();
  else if(S.view==='intro') r.innerHTML=vIntro();
  else if(S.view==='preview') r.innerHTML=vPreview();
  else if(S.view==='rolePreview') r.innerHTML=vRolePreview();
  bind();
}

// ══ ACTIONS ══
async function joinRandom(){await chooseRole(Math.random()<0.5?'c':'r')}

function confirmIntro(){S.view='wait';startPoll();render()}

async function chooseRole(role){
  S.role=role;
  try{S.gs=await getGS();}catch(e){S.gs={step:0,voting:false,results:false,biais:false};}
  S.view='intro';
  render();
}

async function tryAuth(){
  const val=document.getElementById('ci')?.value||'';
  if(val.trim()===ADMIN_CODE){
    S.gs=await getGS();S.votes=await getVotes(S.gs.step);
    S.view='admin';S.authErr=false;startPoll();render();
  } else {S.authErr=true;render()}
}

function selL(n){S.sel=n;render()}

async function submitVote(){
  if(!S.sel)return;
  const gs=S.gs||{step:0};
  await addVote(gs.step,S.role,S.sel);
  S.voted[gs.step]=true;S.view='voted';render();
}

async function aPrev(){
  const gs=await getGS();if(gs.step<=0)return;
  gs.step--;gs.voting=false;gs.results=false;gs.biais=false;
  await setGS(gs);S.gs=gs;S.votes=await getVotes(gs.step);render();
}

async function aNext(){
  const gs=await getGS();if(gs.step>=5)return;
  gs.step++;gs.voting=false;gs.results=false;gs.biais=false;
  await setGS(gs);S.gs=gs;S.votes=await getVotes(gs.step);render();
}

async function toggleVote(){
  const gs=await getGS();gs.voting=!gs.voting;
  await setGS(gs);S.gs=gs;S.votes=await getVotes(gs.step);render();
}

async function toggleBiais(){
  const gs=await getGS();gs.biais=!gs.biais;
  await setGS(gs);S.gs=gs;render();
}

async function toggleRes(){
  const gs=await getGS();gs.results=!gs.results;
  await setGS(gs);S.gs=gs;render();
}

function toggleProj(){S.proj=!S.proj;render()}

async function doReset(){
  if(confirm('Réinitialiser toute la partie ? Tous les votes seront perdus.'))
  {await resetAll();S.gs={step:0,voting:false,results:false};S.votes=[];render()}
}

function bind(){
  const ci=document.getElementById('ci');
  if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth()});
}

// ══ BOOT ══
render();
</script>
